name: QuickDesk macOS

on:
  push:
    paths:
      - 'QuickDesk/**'
      - 'quickdesk-mcp/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - '.github/workflows/quickdesk-macos.yml'
  pull_request:
    paths:
      - 'QuickDesk/**'
      - 'quickdesk-mcp/**'
      - 'cmake/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - '.github/workflows/quickdesk-macos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14
    env:
      QT_VERSION: '6.8.3'
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          modules: 'qtmultimedia qtwebsockets'

      - name: Set Qt path
        run: echo "ENV_QT_PATH=$(dirname "$QT_ROOT_DIR")" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            quickdesk-mcp/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('quickdesk-mcp/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        env:
          ENV_QUICKDESK_API_KEY: ${{ secrets.QUICKDESK_API_KEY }}
        run: bash scripts/build_qd_mac.sh Release

      - name: Build MCP Bridge
        run: bash scripts/build_mcp_mac.sh Release

      - name: Build Agent
        run: bash scripts/build_agent_mac.sh Release

      - name: Publish
        run: bash scripts/publish_qd_mac.sh Release

      - name: Package DMG
        run: bash scripts/package_qd_mac.sh Release

      - name: Get version
        id: version
        run: |
          echo "version=$(cat version)" >> $GITHUB_OUTPUT
          echo "ref-name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickDesk-mac-arm64-${{ steps.version.outputs.ref-name }}
          path: publish/Release/QuickDesk.dmg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: publish/Release/QuickDesk.dmg
          asset_name: QuickDesk-mac-arm64-${{ steps.version.outputs.ref-name }}.dmg
          tag: ${{ github.ref }}
          overwrite: true
